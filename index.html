  <meta name="description" content="A free interactive tool helping K-12 educators discover One Health connections across all subjects." />
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #FAFFFE; } #root { min-height: 100vh; }</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

/* ═══════════════════════════════════
   API CONFIGURATION
   Change API_URL to your Cloudflare Worker URL for deployed version.
   Leave as-is for use inside Claude artifacts.
   ═══════════════════════════════════ */
const API_URL = "https://oh-lens-proxy.amykempy.workers.dev";
// For deployed version, change to your worker URL, e.g.:
// const API_URL = "https://oh-lens-proxy.YOUR-SUBDOMAIN.workers.dev";

/* ═══════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════ */
const QUICK_SUBJECTS = [
  { label: "Health / Science", emoji: "🔬", color: "#2D6A4F" },
  { label: "Mathematics", emoji: "📐", color: "#B45309" },
  { label: "English Language Arts", emoji: "📝", color: "#7C3AED" },
  { label: "Social Studies", emoji: "🏛️", color: "#1E40AF" },

  { label: "Art", emoji: "🎨", color: "#BE185D" },

  { label: "Music", emoji: "🎵", color: "#7C3AED" },

const GRADES = [
  { id: "k2", label: "K–2", color: "#E53E3E" },
  { id: "35", label: "3–5", color: "#DD6B20" },

  { id: "912", label: "9–12", color: "#3182CE" },
];

const TOPIC_SUGGESTIONS = [
  "Nutrition & Food Safety", "Water Quality", "Vector-Borne Diseases", "Antibiotic Resistance",
  "Mental Health & Nature", "Air Pollution", "Zoonotic Diseases", "Climate & Health",
];

const OH_DOMAINS = [
  { id: "human", label: "Human Health", emoji: "👤", color: "#C1440E", desc: "How people's health is affected" },
  { id: "animal", label: "Animal Health", emoji: "🐾", color: "#D4842A", desc: "How domestic and wild animals connect" },
  { id: "plant", label: "Plant Health", emoji: "🌱", color: "#588157", desc: "How crops, forests, and plant systems relate" },
  { id: "environment", label: "Environmental Health", emoji: "💧", color: "#2B6CB0", desc: "How water, air, soil, and climate factor in" },
  { id: "ecosystem", label: "Ecosystem Health", emoji: "🌐", color: "#6B46C1", desc: "How biodiversity, food webs, and balance matter" },
];

/* ═══════════════════════════════════
   SAMPLE WALKTHROUGHS
   ═══════════════════════════════════ */
const SAMPLES = {
  vbd: {

    connections: {

};

/* ═══════════════════════════════════
   MAIN APP
   ═══════════════════════════════════ */
function App() {
  const [showWelcome, setShowWelcome] = useState(true);
  const [subject, setSubject] = useState("");
  const [grade, setGrade] = useState("68");
  const [topic, setTopic] = useState("");
  const [step, setStep] = useState(0); // 0=setup, 1=results
  const [connections, setConnections] = useState(null); // { human: [...], animal: [...], ... }
  const [teacherNotes, setTeacherNotes] = useState("");
  const [loading, setLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const [resources, setResources] = useState(null);
  const [loadingRes, setLoadingRes] = useState(false);
  const [lessonPlan, setLessonPlan] = useState(null);
  const [loadingLP, setLoadingLP] = useState(false);
  const ref = useRef(null);

  useEffect(() => { ref.current?.scrollTo({ top: 0, behavior: "smooth" }); }, [step, showWelcome]);

  const accentColor = QUICK_SUBJECTS.find((s) => s.label === subject)?.color || "#2D6A4F";
  const gradeLabel = GRADES.find((g) => g.id === grade)?.label || grade;

  const reset = () => {
    setSubject(""); setGrade("68"); setTopic(""); setStep(0);
    setConnections(null); setTeacherNotes(""); setAiError("");
    setResources(null); setLessonPlan(null); setShowWelcome(true);
  };

  /* ─── AI: Generate Connections ─── */
  const generateConnections = async () => {
    setLoading(true);
    setAiError("");
    setConnections(null);
    setResources(null);
    setLessonPlan(null);
    setTeacherNotes("");
    const gradeText = GRADES.find((g) => g.id === grade)?.label || grade;

    const prompt = `You are a One Health education expert helping a ${subject} teacher (grades ${gradeText}) find One Health connections in their lesson topic: "${topic}".

One Health recognizes that the health of people, animals, plants, environments, and ecosystems are all connected and interdependent.

For each of the five One Health domains below, generate 2-4 specific, practical, grade-appropriate connections explaining how "${topic}" relates to that domain. Each connection should be 1-2 sentences that a teacher could immediately understand and use. Be concrete — give specific examples, data sources, or activities where possible.

IMPORTANT:
- Only include connections that are genuinely meaningful. If a domain has no real connection to this topic, return an empty array — don't force it.
- Tailor language and complexity to grades ${gradeText}.
- Frame connections as teaching opportunities: how could this teacher use this in their ${subject} classroom?
- Think creatively but stay grounded — surprising connections are great, but they must be real and defensible.

Domains:
- human: How does "${topic}" connect to human health? (physical health, mental health, nutrition, disease, safety, health behaviors)
- animal: How does "${topic}" connect to animal health? (pets, livestock, wildlife, veterinary medicine, zoonotic disease, sentinel species)
- plant: How does "${topic}" connect to plant health? (crops, food systems, agriculture, habitat, invasive species, medicinal plants)
- environment: How does "${topic}" connect to environmental health? (water quality, air quality, soil health, climate, pollution, land use)
- ecosystem: How does "${topic}" connect to ecosystem health? (biodiversity, food webs, ecosystem services, balance, resilience)

Return ONLY valid JSON — no markdown, no backticks, no preamble:
{"human": ["connection 1", "connection 2"], "animal": ["..."], "plant": ["..."], "environment": ["..."], "ecosystem": ["..."]}`;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 3000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      if (data.error) {
        throw new Error(data.error.message || JSON.stringify(data.error));
      }
      const text = data.content?.map((c) => c.text || "").join("\n") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No valid response received. Try again.");
      const parsed = JSON.parse(jsonMatch[0]);
      setConnections(parsed);
      setStep(1);
    } catch (err) {
      console.error("AI generation error:", err);
      setAiError("Error: " + (err.message || "Unknown error") + " — you can still explore the tool using sample walkthroughs.");
    } finally {
      setLoading(false);
    }
  };

  /* ─── AI: Generate Resources ─── */
  const generateResources = async () => {
    setLoadingRes(true);
    const gradeText = GRADES.find((g) => g.id === grade)?.label || grade;

    const connectionSummary = connections ? OH_DOMAINS.map((d) => {
      const items = connections[d.id];
      if (!items?.length) return null;
      return `${d.label}: ${items.join("; ")}`;
    }).filter(Boolean).join("\n") : "";

    const prompt = `You are a One Health education resource specialist. A ${subject} teacher (grades ${gradeText}) has been exploring One Health connections in their lesson topic: "${topic}".

Here are the connections they found:
${connectionSummary}
${teacherNotes ? `\nTeacher's additional notes: ${teacherNotes}` : ""}

Find and recommend specific, real, reliable teaching resources that this teacher could use to bring these One Health connections into their ${gradeText} classroom. Search for current, accessible resources.

IMPORTANT: Only recommend resources that actually exist. Use web search to verify. Prioritize:
- Government sources (CDC, EPA, USDA, WHO, WOAH, FAO)
- University extension programs
- Established education platforms (PBS LearningMedia, National Geographic Education, etc.)
- Real published books (picture books for K-2, novels/nonfiction for older grades)
- Free or low-cost classroom materials

Return ONLY valid JSON with no markdown or backticks:
{
  "data_sources": [{"title": "...", "url": "...", "description": "...", "grades": "..."}],
  "case_studies": [{"title": "...", "url": "...", "description": "...", "grades": "..."}],
  "books": [{"title": "...", "author": "...", "description": "...", "grades": "...", "type": "picture book|novel|nonfiction"}],
  "lesson_materials": [{"title": "...", "url": "...", "description": "...", "grades": "..."}],
  "multimedia": [{"title": "...", "url": "...", "description": "...", "grades": "...", "type": "video|interactive|podcast"}]
}

Include 2-4 items per category. Every item must be real and verifiable.`;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const text = data.content?.filter((c) => c.type === "text").map((c) => c.text || "").join("\n") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      // Extract the JSON object from potentially mixed text
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No valid response received. The AI may still be searching — try again.");
      setResources(JSON.parse(jsonMatch[0]));
    } catch (err) {
      console.error("Resource generation error:", err);
      setResources({ error: "Error: " + (err.message || "Couldn't find resources right now.") });
    } finally {
      setLoadingRes(false);
    }
  };

  /* ─── AI: Generate Lesson Plan ─── */
  const generateLessonPlan = async () => {
    setLoadingLP(true);
    const gradeText = GRADES.find((g) => g.id === grade)?.label || grade;

    const connectionSummary = connections ? OH_DOMAINS.map((d) => {
      const items = connections[d.id];
      if (!items?.length) return null;
      return `${d.label}:\n${items.map((c) => `  - ${c}`).join("\n")}`;
    }).filter(Boolean).join("\n\n") : "";

    const resSummary = resources && !resources.error ? Object.entries(resources).map(([cat, items]) => {
      if (!Array.isArray(items) || !items.length) return null;
      return `${cat}: ${items.map((r) => `${r.title}${r.url ? " (" + r.url + ")" : ""}${r.author ? " by " + r.author : ""}`).join("; ")}`;
    }).filter(Boolean).join("\n") : "No resources loaded yet.";

    const prompt = `You are an expert health educator with deep knowledge of One Health and K-12 pedagogy. Create a detailed, ready-to-teach lesson plan for a ${subject} teacher (grades ${gradeText}) that integrates One Health framed Health Education connections into their existing lesson on "${topic}".

CONTEXT — The teacher used the One Health Lens tool and found these connections:
${connectionSummary}
${teacherNotes ? `\nTeacher's additional notes: ${teacherNotes}` : ""}

AVAILABLE RESOURCES:
${resSummary}

Create a lesson plan that:
1. Keeps the original ${subject} content and standards as the foundation
2. Weaves in One Health framed Health Education connections naturally — students should see how ${topic} relates to human, animal, plant, environment, and ecosystem health
3. Incorporates the specific resources listed above where appropriate
4. Is practical and ready to teach — include specific activities, discussion questions, and timing
5. Names One Health explicitly so students learn the concept

Return ONLY valid JSON with no markdown or backticks:
{
  "title": "Lesson title",
  "overview": "2-3 sentence overview",
  "grade_band": "${gradeText}",
  "subject": "${subject}",
  "duration": "Estimated time",
  "objectives": ["Content objective 1", "..."],
  "oh_objectives": ["One Health objective 1", "..."],
  "materials": ["Material 1 (with URL if available)", "..."],
  "sections": [
    {
      "title": "Section title",
      "duration": "10 min",
      "activity": "Detailed description",
      "oh_connection": "How this connects to One Health (or null)"
    }
  ],
  "assessment": "How to assess understanding",
  "extensions": ["Extension activity 1", "..."],
  "teacher_notes": "Tips including how to introduce One Health"
}`;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const text = data.content?.filter((c) => c.type === "text").map((c) => c.text || "").join("\n") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No valid response received. Try again.");
      setLessonPlan(JSON.parse(jsonMatch[0]));
    } catch (err) {
      console.error("Lesson plan error:", err);
      setLessonPlan({ error: "Error: " + (err.message || "Couldn't generate the lesson plan.") });
    } finally {
      setLoadingLP(false);
    }
  };

  /* ─── Load Sample ─── */
  const loadSample = (key) => {
    const s = SAMPLES[key];
    setSubject(s.subject); setGrade(s.grade); setTopic(s.topic);
    setConnections(s.connections); setStep(1); setShowWelcome(false);
    setTeacherNotes(""); setResources(null); setLessonPlan(null);
  };

  /* ─── Helpers ─── */
  const canGenerate = subject.trim() && topic.trim();
  const filledDomains = connections ? OH_DOMAINS.filter((d) => connections[d.id]?.length > 0) : [];
  const totalBullets = connections ? OH_DOMAINS.reduce((t, d) => t + (connections[d.id]?.length || 0), 0) : 0;
  const [copied, setCopied] = useState(false);

  const formatLessonPlanText = () => {
    if (!lessonPlan) return "";
    let t = `${lessonPlan.title}\n${lessonPlan.subject} · ${lessonPlan.grade_band} · ${lessonPlan.duration}\n\n`;
    t += `${lessonPlan.overview}\n\n`;
    if (lessonPlan.objectives?.length) { t += `CONTENT OBJECTIVES\n${lessonPlan.objectives.map(o => `• ${o}`).join("\n")}\n\n`; }
    if (lessonPlan.oh_objectives?.length) { t += `ONE HEALTH OBJECTIVES\n${lessonPlan.oh_objectives.map(o => `• ${o}`).join("\n")}\n\n`; }
    if (lessonPlan.materials?.length) { t += `MATERIALS NEEDED\n${lessonPlan.materials.map(m => `• ${m}`).join("\n")}\n\n`; }
    if (lessonPlan.sections?.length) {
      t += `LESSON FLOW\n`;
      lessonPlan.sections.forEach(s => {
        t += `\n${s.title} (${s.duration})\n${s.activity}\n`;
        if (s.oh_connection) t += `  → One Health Connection: ${s.oh_connection}\n`;
      });
      t += "\n";
    }
    if (lessonPlan.assessment) { t += `ASSESSMENT\n${lessonPlan.assessment}\n\n`; }
    if (lessonPlan.extensions?.length) { t += `EXTENSIONS\n${lessonPlan.extensions.map(e => `• ${e}`).join("\n")}\n\n`; }
    if (lessonPlan.teacher_notes) { t += `TEACHER NOTES\n${lessonPlan.teacher_notes}\n\n`; }
    t += `---\nGenerated by The One Health Lens Tool · onehealthcommission.org`;
    return t;
  };

  const copyLessonPlan = async () => {
    try {
      await navigator.clipboard.writeText(formatLessonPlanText());
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch { alert("Couldn't copy — try selecting the text manually."); }
  };

  const printLessonPlan = () => {
    const text = formatLessonPlanText();
    const w = window.open("", "_blank");
    w.document.write(`<html><head><title>${lessonPlan.title}</title><style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;padding:0 20px;line-height:1.6;color:#333;white-space:pre-wrap;font-size:14px;}@media print{body{margin:0;padding:20px;}}</style></head><body>${text.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</body></html>`);
    w.document.close();
    w.print();
  };

  /* ═══════════════════════════════════
     RENDER
     ═══════════════════════════════════ */
  return (
    <div style={{ maxWidth: 700, margin: "0 auto", fontFamily: "'Source Sans 3', 'Segoe UI', sans-serif", minHeight: "100vh", background: "#FAFFFE" }}>
      <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet" />

      {/* HEADER */}
      <div style={{ background: `linear-gradient(145deg, #0F2A1D, ${accentColor}, ${accentColor}88)`, padding: "24px 26px 20px", color: "white", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -25, right: -15, fontSize: 110, opacity: 0.06, transform: "rotate(12deg)" }}>🔎</div>
        {!showWelcome && <button onClick={reset} style={{ position: "absolute", top: 14, right: 16, background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8, color: "white", padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif", fontWeight: 600, zIndex: 2 }}>🔄 Start Over</button>}
        <div style={{ position: "relative" }}>
          <h1 style={{ fontFamily: "'Libre Baskerville', Georgia, serif", fontSize: 21, fontWeight: 700, margin: 0 }}>The One Health Lens</h1>
          <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2 }}>K-12 Educator Tool · Any Subject · Enhancing What You Already Teach</div>
          <p style={{ fontSize: 12, opacity: 0.75, margin: "8px 0 0", lineHeight: 1.5, maxWidth: 540 }}>
            Discover One Health connections in your existing lessons — no matter what subject you teach. Based on the One Health Framework for K-12 School Health Systems (LeBoeuf, et al.) and Dr. Laura Kahn's multi-dimensional matrix.
          </p>
        </div>
      </div>

      {/* CONTENT */}
      <div ref={ref} style={{ padding: "18px 22px 110px" }}>

        {/* ═══ WELCOME SCREEN ═══ */}
        {showWelcome && (
          <div>
            <h2 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 22, color: "#1B3A2A", marginBottom: 6 }}>Welcome!</h2>
            <p style={{ fontSize: 14, color: "#3D5A4C", lineHeight: 1.6, marginBottom: 18 }}>
              This free tool helps you find <strong>One Health connections</strong> in lessons you're already teaching. One Health is the idea that the health of people, animals, plants, environments, and ecosystems are all connected and interdependent. You don't need to be a health teacher to use this — the tool works for <strong>any subject</strong>.
            </p>

            <div style={{ background: "#F0F7F2", border: "1.5px solid #B7E4C7", borderRadius: 12, padding: "16px 18px", marginBottom: 18 }}>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: "#2D6A4F", marginBottom: 8 }}>Why This Matters for Your Students</h3>
              <p style={{ fontSize: 13, color: "#3D5A4C", lineHeight: 1.6, margin: "0 0 10px" }}>

              <div style={{ textAlign: "center", padding: "20px", background: "#F0F7F2", borderRadius: 10, border: "1.5px solid #B7E4C7", marginBottom: 14 }}>
                <div style={{ fontSize: 28, marginBottom: 8, animation: "pulse 1.5s ease-in-out infinite" }}>📝</div>
                <p style={{ fontSize: 13, color: "#2D6A4F", fontWeight: 600, margin: 0 }}>Building your lesson plan...</p>
                <p style={{ fontSize: 11, color: "#6B7C74", margin: "4px 0 0" }}>Integrating One Health connections and curated resources into a ready-to-teach plan</p>
              </div>
            )}

            {lessonPlan && !lessonPlan.error && (
              <div style={{ marginBottom: 14, border: "2px solid #2D6A4F", borderRadius: 12, overflow: "hidden" }}>
                <div style={{ background: "linear-gradient(135deg, #1B4332, #2D6A4F)", padding: "16px 18px", color: "white" }}>
                  <h3 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 17, margin: "0 0 4px" }}>📝 {lessonPlan.title}</h3>
                  <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 10 }}>{lessonPlan.subject} · {lessonPlan.grade_band} · {lessonPlan.duration}</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={copyLessonPlan} style={{ padding: "5px 14px", fontSize: 11, fontWeight: 700, border: "1px solid rgba(255,255,255,0.4)", borderRadius: 6, background: copied ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.1)", color: "white", cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif" }}>
                      {copied ? "✓ Copied!" : "📋 Copy Text"}
                    </button>
                    <button onClick={printLessonPlan} style={{ padding: "5px 14px", fontSize: 11, fontWeight: 700, border: "1px solid rgba(255,255,255,0.4)", borderRadius: 6, background: "rgba(255,255,255,0.1)", color: "white", cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif" }}>
                      🖨️ Print / Save PDF
                    </button>
                  </div>
                </div>
                <div style={{ padding: "16px 18px" }}>
                  <p style={{ fontSize: 13, color: "#3D5A4C", lineHeight: 1.6, marginBottom: 14 }}>{lessonPlan.overview}</p>

                  {lessonPlan.objectives?.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: "#1E40AF", textTransform: "uppercase", marginBottom: 6 }}>Content Objectives</h4>
                      {lessonPlan.objectives.map((o, i) => (
                        <div key={i} style={{ fontSize: 12, color: "#374151", lineHeight: 1.5, padding: "3px 0 3px 14px", borderLeft: "3px solid #C7D2FE" }}>{o}</div>
                      ))}
                    </div>
                  )}

                  {lessonPlan.oh_objectives?.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: "#2D6A4F", textTransform: "uppercase", marginBottom: 6 }}>🌍 One Health Objectives</h4>
                      {lessonPlan.oh_objectives.map((o, i) => (
                        <div key={i} style={{ fontSize: 12, color: "#374151", lineHeight: 1.5, padding: "3px 0 3px 14px", borderLeft: "3px solid #B7E4C7" }}>{o}</div>
                      ))}
                    </div>
                  )}

                  {lessonPlan.materials?.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: "#555", textTransform: "uppercase", marginBottom: 6 }}>Materials Needed</h4>
                      {lessonPlan.materials.map((m, i) => (
                        <div key={i} style={{ fontSize: 12, color: "#374151", lineHeight: 1.5, padding: "2px 0" }}>• {m}</div>
                      ))}
                    </div>
                  )}

                  {lessonPlan.sections?.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: "#555", textTransform: "uppercase", marginBottom: 8 }}>Lesson Flow</h4>
                      {lessonPlan.sections.map((sec, i) => (
                        <div key={i} style={{ marginBottom: 10, border: "1px solid #E5EDE8", borderRadius: 8, overflow: "hidden" }}>
                          <div style={{ background: "#F8FAF9", padding: "8px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span style={{ fontWeight: 700, fontSize: 13, color: "#1B3A2A" }}>{sec.title}</span>
                            <span style={{ fontSize: 11, color: "#6B7C74", fontWeight: 600 }}>{sec.duration}</span>
                          </div>
                          <div style={{ padding: "10px 12px" }}>
                            <p style={{ fontSize: 12, color: "#374151", lineHeight: 1.55, margin: 0 }}>{sec.activity}</p>
                            {sec.oh_connection && (
                              <div style={{ marginTop: 8, padding: "6px 10px", background: "#F0FFF4", borderRadius: 6, borderLeft: "3px solid #2D6A4F" }}>
                                <span style={{ fontSize: 10, fontWeight: 700, color: "#2D6A4F", textTransform: "uppercase" }}>🌍 OH Connection: </span>
                                <span style={{ fontSize: 11, color: "#3D5A4C", lineHeight: 1.4 }}>{sec.oh_connection}</span>
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {lessonPlan.assessment && (
                    <div style={{ marginBottom: 14 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: "#555", textTransform: "uppercase", marginBottom: 6 }}>Assessment</h4>
                      <p style={{ fontSize: 12, color: "#374151", lineHeight: 1.55, margin: 0 }}>{lessonPlan.assessment}</p>
                    </div>
                  )}

                  {lessonPlan.extensions?.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: "#555", textTransform: "uppercase", marginBottom: 6 }}>Extensions</h4>
                      {lessonPlan.extensions.map((e, i) => (
                        <div key={i} style={{ fontSize: 12, color: "#374151", lineHeight: 1.5, padding: "2px 0" }}>• {e}</div>
                      ))}
                    </div>
                  )}

                  {lessonPlan.teacher_notes && (
                    <div style={{ padding: "10px 12px", background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 8 }}>
                      <h4 style={{ fontSize: 11, fontWeight: 700, color: "#78350F", textTransform: "uppercase", marginBottom: 4 }}>💡 Teacher Notes</h4>
                      <p style={{ fontSize: 12, color: "#78350F", lineHeight: 1.5, margin: 0 }}>{lessonPlan.teacher_notes}</p>
                    </div>
                  )}
                </div>
              </div>
            )}

            {lessonPlan && !lessonPlan.error && (
              <div style={{ fontSize: 11, color: "#6B7C74", background: "#F8FAF9", border: "1px solid #E5EDE8", borderRadius: 8, padding: "8px 12px", marginBottom: 14, lineHeight: 1.45, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                <span><strong>💡 Not quite right?</strong> Click <strong>← Back</strong> to adjust your topic or add notes, then regenerate. The more specific your input, the more tailored your lesson plan will be.</span>
                <button onClick={() => { setLessonPlan(null); generateLessonPlan(); }} style={{ fontSize: 10, padding: "4px 10px", border: "1px solid #B7E4C7", borderRadius: 6, background: "#F0FFF4", color: "#2D6A4F", cursor: "pointer", fontWeight: 600, fontFamily: "'Source Sans 3', sans-serif", flexShrink: 0 }}>🔄 Regenerate Lesson Plan</button>
              </div>
            )}

            {lessonPlan?.error && (
              <div style={{ padding: "12px 14px", background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 9, marginBottom: 14, fontSize: 12, color: "#78350F" }}>
                {lessonPlan.error}
                <button onClick={generateLessonPlan} style={{ marginLeft: 8, padding: "3px 10px", fontSize: 11, border: "1px solid #D4842A", borderRadius: 5, background: "white", color: "#78350F", cursor: "pointer", fontWeight: 600 }}>Try Again</button>
              </div>
            )}

            {/* Citation */}
            <div style={{ padding: 12, background: "#FFFBE6", borderRadius: 9, border: "1px solid #FDE68A", fontSize: 10, color: "#78350F", lineHeight: 1.4 }}>
              <strong>Citation:</strong> One Health connections framework based on the One Health Framework for K-12 School Health Systems (LeBoeuf, et al.) and adapted from Kahn, L.H. (2021). "Developing a One Health Approach by Using a Multi-Dimensional Matrix." <em>One Health</em>, 13, 100289.
            </div>
          </div>
        )}
      </div>

      {/* ═══ NAVIGATION ═══ */}
      {!showWelcome && !loading && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "white", borderTop: "1px solid #D0DDD5", padding: "9px 22px", display: "flex", justifyContent: "space-between", maxWidth: 700, margin: "0 auto", boxSizing: "border-box", zIndex: 100 }}>
          {step > 0 ? (
            <button onClick={() => { setStep(0); setConnections(null); setResources(null); setLessonPlan(null); }} style={{ padding: "8px 16px", fontSize: 12, fontWeight: 600, border: "1.5px solid #D0DDD5", borderRadius: 7, background: "white", color: "#2D6A4F", cursor: "pointer" }}>← Back</button>
          ) : <div />}
          {step === 1 ? (
            <button onClick={reset} style={{ padding: "8px 20px", fontSize: 12, fontWeight: 700, border: "none", borderRadius: 7, background: `linear-gradient(135deg, #1B4332, ${accentColor})`, color: "white", cursor: "pointer" }}>🔄 New Topic</button>
          ) : <div />}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
