      {SUBJECTS.map((s) => (
        <div key={s.id} onClick={() => onSelect(s.id)} style={{ border: selected === s.id ? `2.5px solid ${s.color}` : "1.5px solid #DDE5DB", borderRadius: 14, padding: "16px 14px", cursor: "pointer", background: selected === s.id ? `${s.color}08` : "white", transition: "all 0.2s" }}>
          <div style={{ fontSize: 26, marginBottom: 4 }}>{s.emoji}</div>
          <div style={{ fontWeight: 700, fontSize: 14, color: selected === s.id ? s.color : "#1B3A2A", marginBottom: 2 }}>{s.label}</div>
          <div style={{ fontSize: 11, color: "#7B8C82", lineHeight: 1.3 }}>{s.desc}</div>
        </div>
      ))}
    </div>
  );
}

function Card({ item, grade, value, onChange, accent }) {
  const [open, setOpen] = useState(false);
  const c = item.color || accent || "#2D6A4F";
  const ps = item.prompts ? (typeof item.prompts === "object" && !Array.isArray(item.prompts) ? (item.prompts[grade] || item.prompts["68"] || []) : item.prompts) : [];

  return (
    <div style={{ border: `1.5px solid ${value ? c + "50" : "#E2E8E0"}`, borderRadius: 12, marginBottom: 8, background: value ? `${c}05` : "#FEFFFE", overflow: "hidden" }}>
      <div onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer", userSelect: "none" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 20 }}>{item.emoji}</span>
          <span style={{ fontWeight: 700, fontSize: 14, color: "#1B3A2A" }}>{item.label}</span>
          {value && <span style={{ fontSize: 9, background: c + "20", color: c, padding: "2px 7px", borderRadius: 8, fontWeight: 700, textTransform: "uppercase" }}>✓</span>}
        </div>
        <span style={{ fontSize: 13, color: "#AAA", transform: open ? "rotate(180deg)" : "none", transition: "transform 0.15s" }}>▾</span>
      </div>
      {open && (
        <div style={{ padding: "0 14px 14px" }}>
          {ps.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 10 }}>
              {ps.map((p, i) => (
                <div key={i} style={{ fontSize: 12, color: "#3D5A4C", padding: "6px 10px", background: "#F0F7F2", borderRadius: 7, borderLeft: `3px solid ${c}`, lineHeight: 1.35 }}>💡 {p}</div>
              ))}
            </div>
          )}
          <textarea value={value || ""} onChange={(e) => onChange(item.id, e.target.value)} placeholder="Type your connections..." rows={2} style={{ width: "100%", padding: 10, fontSize: 13, border: "1.5px solid #D0DDD5", borderRadius: 8, resize: "vertical", fontFamily: "'Source Sans 3', sans-serif", outline: "none", boxSizing: "border-box", lineHeight: 1.45, background: "#FAFFFE" }} onFocus={(e) => (e.target.style.borderColor = c)} onBlur={(e) => (e.target.style.borderColor = "#D0DDD5")} />
        </div>
      )}
    </div>
  );
}

function StdToggle({ item, selected, toggle, color }) {
  const sel = selected.includes(item.id);
  return (
    <div onClick={() => toggle(item.id)} style={{ display: "flex", alignItems: "flex-start", gap: 8, border: sel ? `2px solid ${color}` : "1.5px solid #E2E8E0", borderRadius: 10, padding: "10px 12px", background: sel ? `${color}08` : "white", cursor: "pointer", marginBottom: 6 }}>
      <span style={{ width: 20, height: 20, borderRadius: 5, background: sel ? color : "#E2E8E0", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, flexShrink: 0, marginTop: 1 }}>{sel ? "✓" : ""}</span>
      <div>
        <div style={{ fontWeight: 700, fontSize: 13, color: "#1B3A2A" }}>{item.code}: {item.title}</div>
        {sel && item.oh && <div style={{ fontSize: 11, color, marginTop: 3, fontStyle: "italic", lineHeight: 1.3 }}>🌍 {item.oh}</div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   MAIN APP
   ═══════════════════════════════════ */
function App() {
  const [subj, setSubj] = useState("");
  const [grade, setGrade] = useState("68");
  const [topic, setTopic] = useState("");
  const [subjArea, setSubjArea] = useState("");
  const [step, setStep] = useState(0); // 0=setup, 1-N=dims, N+1=results
  const [dimData, setDimData] = useState({});
  const ref = useRef(null);

  useEffect(() => { ref.current?.scrollTo({ top: 0, behavior: "smooth" }); }, [step]);

  const dims = DIMS[subj] || [];
  const subjColor = SUBJECTS.find((s) => s.id === subj)?.color || "#2D6A4F";
  const gradeLabel = GRADES.find((g) => g.id === grade)?.label || grade;

  const changeSubj = (id) => { setSubj(id); setDimData({}); setStep(0); };
  const changeTopic = (t) => { setTopic(t); setDimData({}); };

  const updateDim = (dimId, itemId, val) => setDimData((p) => ({ ...p, [dimId]: { ...(p[dimId] || {}), [itemId]: val } }));

  const loadSample = (id) => {
    const s = SAMPLES[id];
    setSubj(id); setTopic(s.topic); setGrade(s.grade); setSubjArea(s.subject);
    const d = {}; Object.entries(s.data).forEach(([dk, dv]) => { d[dk] = dv; });
    setDimData(d); setStep((DIMS[id] || []).length + 1);
  };

  const reset = () => { setSubj(""); setGrade("68"); setTopic(""); setSubjArea(""); setStep(0); setDimData({}); };
  const canNext = step === 0 ? (subj && topic.trim()) : true;

  const filledCount = Object.values(dimData).reduce((t, d) => t + Object.values(d).filter((v) => v?.trim()).length, 0);
  const totalSlots = dims.reduce((t, d) => t + d.items.length, 0);

  const totalSteps = 1 + dims.length; // setup + dims + results
  const stepLabels = ["Setup", ...dims.map((d) => d.title.split(" ")[0]), "Results"];

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", fontFamily: "'Source Sans 3', 'Segoe UI', sans-serif", minHeight: "100vh", background: "#FAFFFE" }}>
      <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet" />

      {/* HEADER */}
      <div style={{ background: `linear-gradient(145deg, #0F2A1D, ${subjColor || "#1B4332"}, ${subjColor || "#2D6A4F"}88)`, padding: "24px 26px 20px", color: "white", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -25, right: -15, fontSize: 110, opacity: 0.06, transform: "rotate(12deg)" }}>🔎</div>
        <div style={{ position: "relative" }}>
          <h1 style={{ fontFamily: "'Libre Baskerville', Georgia, serif", fontSize: 21, fontWeight: 700, margin: 0 }}>The One Health Lens</h1>
          <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2 }}>K-12 Educator Tool · All Subjects · Track 2: Enhancing What You Already Teach</div>
          <p style={{ fontSize: 12, opacity: 0.75, margin: "8px 0 0", lineHeight: 1.5, maxWidth: 540 }}>
            Discover One Health connections in your existing lessons — whether you teach health, science, math, ELA, social studies, STEM, or art. Based on Dr. Laura Kahn's multi-dimensional matrix.
          </p>
        </div>
      </div>

      {/* STEP DOTS */}
      <div style={{ display: "flex", gap: 4, justifyContent: "center", padding: "14px 20px 0" }}>
        {Array.from({ length: totalSteps }).map((_, i) => (
          <div key={i} onClick={() => i <= step ? setStep(i) : null} style={{ width: i === step ? 24 : 9, height: 9, borderRadius: 5, background: i <= step ? subjColor : "#DDE5DB", transition: "all 0.3s", cursor: i <= step ? "pointer" : "default" }} />
        ))}
      </div>

      {/* CONTENT */}
      <div ref={ref} style={{ padding: "18px 22px 110px" }}>

        {/* STEP 0: SETUP */}
        {step === 0 && (
          <div>
            <h2 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 22, color: "#1B3A2A", marginBottom: 6 }}>Choose Your Subject & Topic</h2>
            <div style={{ background: "#F0F7F2", border: "1.5px solid #B7E4C7", borderRadius: 12, padding: "14px 16px", marginBottom: 20, fontSize: 12, color: "#3D5A4C", lineHeight: 1.5 }}>
              <strong style={{ color: "#2D6A4F" }}>Track 2:</strong> This tool helps you find One Health connections in topics you're <em>already teaching</em>. Select your subject area and the tool will provide guided questions designed for your discipline.
            </div>

            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.06em" }}>Subject Area</label>
            <SubjectPicker selected={subj} onSelect={changeSubj} />

            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.06em" }}>Topic You're Teaching</label>
            <input type="text" value={topic} onChange={(e) => changeTopic(e.target.value)} placeholder='e.g., "Water Quality" or "Ratios & Proportions"' style={{ width: "100%", padding: "12px 14px", fontSize: 14, border: "2px solid #C6DBC8", borderRadius: 10, outline: "none", fontFamily: "'Source Sans 3', sans-serif", background: "#FAFFFE", boxSizing: "border-box", marginBottom: 12 }} />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 18 }}>
              {TOPICS.map((t) => <button key={t} onClick={() => changeTopic(t)} style={{ padding: "4px 11px", fontSize: 11, border: topic === t ? "2px solid #2D6A4F" : "1px solid #DDE5DB", borderRadius: 16, background: topic === t ? "#D8F3DC" : "white", color: "#2D6A4F", cursor: "pointer", fontWeight: topic === t ? 700 : 400 }}>{t}</button>)}
            </div>

            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
              <div style={{ flex: 1, minWidth: 180 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, textTransform: "uppercase" }}>Grade Band</label>
                <div style={{ display: "flex", gap: 5 }}>
                  {GRADES.map((g) => <button key={g.id} onClick={() => setGrade(g.id)} style={{ flex: 1, padding: "8px 4px", fontSize: 12, fontWeight: grade === g.id ? 700 : 500, border: grade === g.id ? `2px solid ${g.color}` : "1.5px solid #DDE5DB", borderRadius: 7, background: grade === g.id ? `${g.color}10` : "white", color: grade === g.id ? g.color : "#888", cursor: "pointer" }}>{g.label}</button>)}
                </div>
              </div>
              <div style={{ flex: 1, minWidth: 180 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#2D6A4F", marginBottom: 6, textTransform: "uppercase" }}>Course/Class Name (optional)</label>
                <input type="text" value={subjArea} onChange={(e) => setSubjArea(e.target.value)} placeholder="e.g., 7th Grade Life Science" style={{ width: "100%", padding: "8px 12px", fontSize: 12, border: "1.5px solid #C6DBC8", borderRadius: 7, outline: "none", fontFamily: "'Source Sans 3', sans-serif", background: "#FAFFFE", boxSizing: "border-box" }} />
              </div>
            </div>

            <div style={{ fontSize: 12, fontWeight: 700, color: "#6B7C74", marginBottom: 8 }}>Or load a sample walkthrough:</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              {Object.entries(SAMPLES).map(([k, v]) => {
                const s = SUBJECTS.find((x) => x.id === k);
                return (
                  <button key={k} onClick={() => loadSample(k)} style={{ padding: "10px 12px", fontSize: 12, border: "2px dashed #B7E4C7", borderRadius: 10, background: "#F0FFF4", color: "#2D6A4F", cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif", textAlign: "left", lineHeight: 1.3 }}>
                    <span style={{ fontSize: 16, marginRight: 4 }}>{s?.emoji}</span>
                    <strong>{v.topic}</strong>
                    <div style={{ fontSize: 10, color: "#6B7C74", marginTop: 2 }}>{s?.label} · Gr. {GRADES.find((g) => g.id === v.grade)?.label}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* DIMENSION STEPS */}
        {step >= 1 && step <= dims.length && (() => {
          const dim = dims[step - 1];
          return (
            <div key={dim.id}>
              <h2 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 21, color: "#1B3A2A", marginBottom: 4 }}>{dim.icon} {dim.title}</h2>
              <p style={{ fontSize: 13, color: "#4A6B5A", marginBottom: 16, lineHeight: 1.5 }}>
                Explore how <strong>"{topic}"</strong> connects through this lens. Expand each card for grade-appropriate prompts ({gradeLabel}).
              </p>
              {dim.items.map((item) => (
                <Card key={item.id} item={item} grade={grade} value={dimData[dim.id]?.[item.id] || ""} onChange={(iid, val) => updateDim(dim.id, iid, val)} accent={subjColor} />
              ))}
            </div>
          );
        })()}

        {/* RESULTS */}
        {step === dims.length + 1 && (() => {
          let sLabel = "Emerging", sColor = "#D97706";
          if (filledCount >= 10) { sLabel = "Rich"; sColor = "#059669"; }
          else if (filledCount >= 6) { sLabel = "Strong"; sColor = "#2563EB"; }
          else if (filledCount >= 3) { sLabel = "Growing"; sColor = "#7C3AED"; }

          return (
            <div>
              <h2 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 22, color: "#1B3A2A", marginBottom: 6 }}>🗺️ Your One Health Lesson Map</h2>
              <p style={{ fontSize: 13, color: "#4A6B5A", marginBottom: 16, lineHeight: 1.5 }}>OH connections for <strong>"{topic}"</strong> via the <strong>{SUBJECTS.find((s) => s.id === subj)?.label}</strong> lens.</p>

              <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
                <div style={{ background: `linear-gradient(135deg, #D8F3DC, #B7E4C7)`, borderRadius: 10, padding: "12px 14px", flex: 1, minWidth: 100 }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: "#1B4332" }}>{filledCount}/{totalSlots}</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#2D6A4F", textTransform: "uppercase" }}>Connections</div>
                </div>
                <div style={{ background: `${sColor}10`, border: `1.5px solid ${sColor}30`, borderRadius: 10, padding: "12px 14px", flex: 1, minWidth: 100 }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: sColor }}>{sLabel}</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#555", textTransform: "uppercase" }}>Integration</div>
                </div>
                <div style={{ background: "#F0F4FF", borderRadius: 10, padding: "12px 14px", flex: 1, minWidth: 100 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#1E40AF" }}>{gradeLabel}</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#555", textTransform: "uppercase" }}>Grade Band</div>
                  {subjArea && <div style={{ fontSize: 11, color: "#3B82F6" }}>{subjArea}</div>}
                </div>
              </div>

              {dims.map((dim) => {
                const dd = dimData[dim.id] || {};
                const filled = dim.items.filter((it) => dd[it.id]?.trim());
                if (!filled.length) return null;
                return (
                  <div key={dim.id} style={{ marginBottom: 16 }}>
                    <h3 style={{ fontSize: 13, fontWeight: 700, color: "#1B4332", paddingBottom: 4, borderBottom: "2px solid #D8F3DC", textTransform: "uppercase", letterSpacing: "0.03em", marginBottom: 6 }}>{dim.icon} {dim.title}</h3>
                    {filled.map((item) => (
                      <div key={item.id} style={{ display: "flex", gap: 8, marginBottom: 5, padding: "8px 10px", background: "#FAFFFE", borderRadius: 8, border: "1px solid #E5EDE8" }}>
                        <span style={{ fontSize: 16, flexShrink: 0 }}>{item.emoji}</span>
                        <div><div style={{ fontWeight: 700, fontSize: 12, color: "#2D6A4F" }}>{item.label}</div><div style={{ fontSize: 12, color: "#3D4F46", lineHeight: 1.45, whiteSpace: "pre-wrap" }}>{dd[item.id]}</div></div>
                      </div>
                    ))}
                  </div>
                );
              })}

              <div style={{ padding: "14px 16px", background: "#F0F4FF", border: "1.5px solid #C7D2FE", borderRadius: 10, marginBottom: 16 }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: "#1E40AF", marginBottom: 6 }}>📋 About Your Lesson Standards</h3>
                <p style={{ fontSize: 12, color: "#374151", lineHeight: 1.55, margin: 0 }}>
                  Your original lesson standards remain fully addressed — the One Health Lens doesn't change what you teach, it helps your students <strong>make cross-curricular connections to health</strong> within the content they're already learning. When students see how health connects to math, art, social studies, science, ELA, or STEM, they build health literacy across the school day — without needing a separate health class to do it.
                </p>
              </div>

              <div style={{ padding: 18, background: `linear-gradient(135deg, #1B4332, ${subjColor})`, borderRadius: 12, color: "white", marginBottom: 14 }}>
                <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, fontFamily: "'Libre Baskerville', serif" }}>💡 Turning Connections into Teaching Moments</h3>
                <div style={{ fontSize: 12, lineHeight: 1.65, opacity: 0.95 }}>
                  {subj === "math" ? <>
                    <p style={{margin:"0 0 6px"}}><strong>1.</strong> Start with real data — CDC reports, EPA monitoring, or veterinary surveillance.</p>
                    <p style={{margin:"0 0 6px"}}><strong>2.</strong> Have students calculate THEN interpret: "What does this attack rate tell us about the source?"</p>
                    <p style={{margin:"0 0 6px"}}><strong>3.</strong> Compare across OH sectors: human case data alongside animal data alongside environmental data.</p>
                    <p style={{margin:0}}><strong>4.</strong> Name it: "You just did epidemiology. Scientists call this systems approach <em>One Health</em>."</p>
                  </> : subj === "ela" ? <>
                    <p style={{margin:"0 0 6px"}}><strong>1.</strong> Start with a compelling narrative — a patient story, a vet's observation, a community's fight for clean water.</p>
                    <p style={{margin:"0 0 6px"}}><strong>2.</strong> Have students read across disciplines — compare a CDC report, a news article, and a personal account.</p>
                    <p style={{margin:"0 0 6px"}}><strong>3.</strong> Write for different audiences: same topic, different stakeholders, different genres.</p>
                    <p style={{margin:0}}><strong>4.</strong> Name it: "When we look at how human, animal, and environmental stories intersect, that's <em>One Health</em>."</p>
                  </> : subj === "ss" ? <>
                    <p style={{margin:"0 0 6px"}}><strong>1.</strong> Start with a map — overlay health, environmental, and socioeconomic data. What patterns emerge?</p>
                    <p style={{margin:"0 0 6px"}}><strong>2.</strong> Trace a policy upstream: How does a zoning decision affect ecosystems, which affect animal populations, which affect human health?</p>
                    <p style={{margin:"0 0 6px"}}><strong>3.</strong> Center equity: Who bears the burden? Whose voices are missing from the policy table?</p>
                    <p style={{margin:0}}><strong>4.</strong> Name it: "When we analyze how human, animal, and environmental systems connect, that's <em>One Health</em>."</p>
                  </> : subj === "stem" ? <>
                    <p style={{margin:"0 0 6px"}}><strong>1.</strong> Start with a real problem that no single discipline can solve alone — it NEEDS human, animal, and environmental perspectives.</p>
                    <p style={{margin:"0 0 6px"}}><strong>2.</strong> Have students define constraints from ALL sectors: human safety, animal welfare, environmental impact, cost.</p>
                    <p style={{margin:"0 0 6px"}}><strong>3.</strong> Test and iterate: Does the solution work for people but harm wildlife? Back to the drawing board.</p>
                    <p style={{margin:0}}><strong>4.</strong> Name it: "Engineers who design for human, animal, AND environmental health are using <em>One Health</em> thinking."</p>
                  </> : subj === "art" ? <>
                    <p style={{margin:"0 0 6px"}}><strong>1.</strong> Start with observation — slow, careful looking at the natural connections around us.</p>
                    <p style={{margin:"0 0 6px"}}><strong>2.</strong> Shift perspectives: Create from the viewpoint of an animal, a river, a farmer, a microbe.</p>
                    <p style={{margin:"0 0 6px"}}><strong>3.</strong> Design for audience: Who needs to understand this OH connection? Create art that reaches them.</p>
                    <p style={{margin:0}}><strong>4.</strong> Name it: "Artists who make the invisible connections between human, animal, and environmental health visible are practicing <em>One Health</em>."</p>
                  </> : <>
                    <p style={{margin:"0 0 6px"}}><strong>1.</strong> Open with two seemingly unrelated connections. Challenge students: "What do these have to do with each other?"</p>
                    <p style={{margin:"0 0 6px"}}><strong>2.</strong> Pick one OH Factor + one Complexity Level as your core frame. Use others to deepen.</p>
                    <p style={{margin:"0 0 6px"}}><strong>3.</strong> Make it local using your PSE notes. What policies or realities make this relevant to your students?</p>
                    <p style={{margin:0}}><strong>4.</strong> Name it: "You just analyzed a topic the way scientists and policymakers do — that's <em>One Health</em>."</p>
                  </>}
                </div>
              </div>

              <div style={{ padding: 12, background: "#FFFBE6", borderRadius: 9, border: "1px solid #FDE68A", fontSize: 10, color: "#78350F", lineHeight: 1.4 }}>
                <strong>Citation:</strong> Health/Science lens adapted from Kahn, L.H. (2021). "Developing a One Health Approach by Using a Multi-Dimensional Matrix." <em>One Health</em>, 13, 100289. Cross-curricular lenses (Math, ELA, Social Studies, STEM, Art) developed for K-12 educators as part of the One Health Framework for K-12 School Health Systems (LeBoeuf, et al.).
              </div>
            </div>
          );
        })()}
      </div>

      {/* NAV */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "white", borderTop: "1px solid #D0DDD5", padding: "9px 22px", display: "flex", justifyContent: "space-between", maxWidth: 700, margin: "0 auto", boxSizing: "border-box", zIndex: 100 }}>
        {step > 0 ? <button onClick={() => setStep(step - 1)} style={{ padding: "8px 16px", fontSize: 12, fontWeight: 600, border: "1.5px solid #D0DDD5", borderRadius: 7, background: "white", color: "#2D6A4F", cursor: "pointer" }}>← Back</button> : <div />}
        {step < dims.length + 1 ? (
          <button onClick={() => canNext && setStep(step + 1)} disabled={!canNext} style={{ padding: "8px 20px", fontSize: 12, fontWeight: 700, border: "none", borderRadius: 7, background: canNext ? `linear-gradient(135deg, #1B4332, ${subjColor})` : "#DDD", color: canNext ? "white" : "#999", cursor: canNext ? "pointer" : "not-allowed" }}>
            {step === 0 ? "Start Analysis →" : step === dims.length ? "View Lesson Map →" : "Next →"}
          </button>
        ) : (
          <button onClick={reset} style={{ padding: "8px 20px", fontSize: 12, fontWeight: 700, border: "none", borderRadius: 7, background: `linear-gradient(135deg, #1B4332, ${subjColor})`, color: "white", cursor: "pointer" }}>🔄 New Analysis</button>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
